name: CI

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Vitest, Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      # Lint baseline (ADR-S2-001): 전체 lint 가 fail 해도 CI 는 진행.
      # 결과는 step output 과 로그에 남겨 검토 가능하게 한다.
      - name: Lint (baseline, non-blocking)
        id: lint
        run: |
          set +e
          npm run lint | tee lint.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          if [ "${status}" -ne 0 ]; then
            echo "::warning::lint exited with code ${status} (baseline accepted per ADR-S2-001)"
          fi
          exit 0

      - name: Lint summary
        run: |
          echo "lint exit code: ${{ steps.lint.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Vitest
        run: npm test

      - name: Playwright (chromium)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
